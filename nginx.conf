server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # TLS se termina en el proxy de Render; este header le dice al navegador
    # que fuerce HTTPS en visitas futuras aunque el usuario escriba http://.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy: solo permite los origenes externos que la app
    # realmente usa (fuentes/iconos, Google Identity, Firebase Messaging,
    # tiles de OpenStreetMap, imagenes de Cloudinary, y el propio backend).
    # style-src necesita 'unsafe-inline' porque la app usa estilos inline
    # (React style={{}}); script-src NO lo tiene, que es la parte que
    # realmente importa para frenar inyeccion de scripts.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://res.cloudinary.com https://playstop-backend-1.onrender.com https://*.tile.openstreetmap.org https://images.unsplash.com https://randomuser.me https://github.com https://avatars.githubusercontent.com; connect-src 'self' https://playstop-backend-1.onrender.com wss://playstop-backend-1.onrender.com https://accounts.google.com https://fcm.googleapis.com https://firebaseinstallations.googleapis.com; frame-src https://accounts.google.com" always;

    # Immutable cache for hashed JS/CSS chunks
    location ~* \.(js|css|woff2?|ttf|eot|webp|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must never be cached
    location ~* (sw\.js|firebase-messaging-sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # manifest.json — short cache so browsers get updates
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA routing — all paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
