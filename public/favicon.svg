<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fondo oscuro con resplandor moderno -->
    <radialGradient id="glow" cx="0%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="1"/>
    </radialGradient>

    <!-- Borde con luz de neón combinando colores de la marca -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.5" />
    </linearGradient>

    <!-- Textura cristalina para los símbolos blancos -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Sombra profunda + aura azul neón -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#2563eb" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="#0f172a" />
  <rect width="512" height="512" rx="120" fill="url(#glow)" />
  <rect x="2" y="2" width="508" height="508" rx="118" fill="none" stroke="url(#borderGlow)" stroke-width="4" />

  <!-- Símbolos de Play y Stop centrados ópticamente -->
  <g filter="url(#neonGlow)">
    <path d="M 123 186 L 239 256 L 123 326 Z" fill="url(#iconGradient)" stroke="url(#iconGradient)" stroke-width="32" stroke-linejoin="round" />
    <rect x="279" y="184" width="144" height="144" rx="32" fill="url(#iconGradient)" />
  </g>
</svg>