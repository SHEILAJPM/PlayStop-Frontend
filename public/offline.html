<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · PlayStop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #030712;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #00d084, #00b875);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: #0a1628;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(0, 208, 132, 0.4);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 208, 132, 0.4); }
      50% { box-shadow: 0 0 60px rgba(0, 208, 132, 0.7); }
    }
    .icon-wifi {
      font-size: 3.5rem;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: #f8fafc;
    }
    p {
      color: #64748b;
      font-size: 0.92rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 12px;
      background: linear-gradient(135deg, #00d084, #00b875);
      color: #0a1628;
      font-weight: 800;
      font-size: 0.92rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0, 208, 132, 0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0, 208, 132, 0.45); }
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 28px 0;
    }
    .tip {
      font-size: 0.78rem;
      color: #475569;
      line-height: 1.5;
    }
    .tip span { color: #00d084; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">P</div>
    <div class="icon-wifi">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>No pudimos cargar PlayStop. Revisa tu conexión a internet e intenta de nuevo.</p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Reintentar
    </button>
    <div class="divider"></div>
    <p class="tip">
      Cuando tengas conexión, podrás volver a reservar canchas,<br/>
      ver el mapa y chatear con los propietarios.<br/>
      <span>PlayStop te espera ⚽</span>
    </p>
  </div>
</body>
</html>
