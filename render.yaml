services:
  - type: web
    name: playstop-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://playstop-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
